<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance Scanner</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app" id="app">

    <header>
      <h1>Attendance</h1>
      <button id="cfg-btn" class="icon-btn" title="Settings">⚙</button>
    </header>

    <!-- Entry / Exit toggle -->
    <div class="mode-toggle" id="mode-toggle">
      <button class="mode-btn active" id="btn-entry" data-mode="entry">
        ● Entry
      </button>
      <button class="mode-btn" id="btn-exit" data-mode="exit">
        ● Exit
      </button>
    </div>

    <!-- Camera -->
    <div class="camera-wrap" id="camera-wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas" hidden></canvas>
      <div class="corners">
        <span class="tl"></span><span class="tr"></span>
        <span class="bl"></span><span class="br"></span>
      </div>
      <div id="idle-msg" class="idle-msg">Tap <strong>Start</strong> to scan</div>
      <div id="flash" class="flash"></div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <select id="cam-select"></select>
      <button id="btn-start" class="btn green">▶ Start</button>
      <button id="btn-stop"  class="btn"      disabled>■ Stop</button>
    </div>

    <label class="upload-btn">
      📁 Scan from image
      <input id="img-upload" type="file" accept="image/*" hidden />
    </label>

    <!-- Last scan result -->
    <div id="result" class="result hidden"></div>

    <!-- Log -->
    <div class="log-section">
      <div class="log-header">
        <span>Log</span>
        <span id="count" class="count">0</span>
      </div>
      <ul id="log-list"></ul>
      <p id="log-empty" class="empty">No scans yet</p>
    </div>

  </div>

  <!-- Settings modal -->
  <div id="modal-bg" class="modal-bg hidden">
    <div class="modal">
      <h2>Settings</h2>
      <label>
        Apps Script URL
        <input id="cfg-url" type="url" placeholder="https://script.google.com/macros/s/…/exec" />
      </label>
      <div class="modal-btns">
        <button id="cfg-save"   class="btn green">Save</button>
        <button id="cfg-cancel" class="btn">Cancel</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
